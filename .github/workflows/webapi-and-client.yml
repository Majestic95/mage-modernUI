# Path C — focused CI for the WebApi module + webclient. Runs only
# when paths under those owned directories change, so upstream-only
# commits don't waste runner minutes here. Upstream's maven.yml is
# preserved untouched and continues to test the full engine.
#
# Slice 56 — audit-driven stand-up. Was the single biggest risk in the
# project pre-CI: 401 webclient + 187 server tests with no automation
# means a regression in an untested path is just a matter of time.

name: WebApi + webclient

on:
  push:
    branches: [main, master]
    paths:
      - 'Mage.Server.WebApi/**'
      - 'webclient/**'
      - 'docs/schema/**'
      - '.github/workflows/webapi-and-client.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Mage.Server.WebApi/**'
      - 'webclient/**'
      - 'docs/schema/**'
      - '.github/workflows/webapi-and-client.yml'

# Cancel in-progress runs on the same ref so a fast-followup commit
# doesn't waste minutes finishing a now-stale build.
concurrency:
  group: webapi-and-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webapi:
    name: WebApi (mvn test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install upstream artifacts to local Maven cache
        # The WebApi module depends on upstream artifacts (Mage,
        # Mage.Common, Mage.Sets, Mage.Server). Install them once
        # before testing so transitive dep resolution doesn't fail
        # on a fresh runner. -DskipTests avoids running the upstream
        # 30-min test suite — we only need the JARs in ~/.m2.
        run: mvn -B -DskipTests install
        working-directory: ${{ github.workspace }}

      - name: Run WebApi tests
        run: mvn -B test
        working-directory: Mage.Server.WebApi

  webclient:
    name: webclient (typecheck + lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: webclient/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: webclient

      - name: Typecheck
        run: pnpm typecheck
        working-directory: webclient

      - name: Lint
        run: pnpm lint
        working-directory: webclient
        # Slice 67 — flipped from informational to gating after slice
        # 66a cleared the 4 pre-existing errors (react-refresh exports
        # + set-state-in-effect + impure-render). pnpm lint is now a
        # CI gate alongside typecheck + tests. The 1 remaining warning
        # (unused-eslint-disable in public/sw.js) is acceptable noise.

      - name: Tests
        run: pnpm test
        working-directory: webclient
